<html>
    <head>
        <title>Horace.exe</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="style.css">
        <script src="script.js"></script>
    </head>
    <body>
        <!-- main landing page -->
        <section class= "active" id="home">
            Hello, welcome to my portfolio website. Navigate using the circle at the bottom of the screen.
        </section>

        <!-- about me page -->
        <section id="about-me">
            Testing about me
        </section>

        <!-- project page -->
        <section id="projects">
            Testing Projects
        </section>

        <!-- circle here that expands on hover to present the list of pages -->
        <div id="control">
            <button onclick="loadPage('home')">Home</button>
            <button onclick="loadPage('about-me')">About Me</button>
            <button onclick="loadPage('projects')">Projects</button>
        </div>
    </body>
</html>
